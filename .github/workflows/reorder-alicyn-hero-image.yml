name: Reorder Alicyn hero product image

on:
  push:
    branches:
      - codex/reorder-alicyn-hero-image-first

permissions:
  contents: write

jobs:
  reorder-hero-image:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/reorder-alicyn-hero-image-first
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move product image before hero copy
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('sections/alicyn-landing.liquid')
          source = path.read_text()
          copy_open = '      <div class="hero-copy">\n'
          image_open = '      <div class="hero-product" aria-label="Imagen de producto Alicyn">\n'
          image_close = '      </div>\n    </section>'

          if source.count(copy_open) != 1 or source.count(image_open) != 1:
              raise SystemExit('Expected unique hero copy and product image blocks.')

          copy_start = source.index(copy_open)
          image_start = source.index(image_open)
          if image_start < copy_start:
              print('Product image is already first in hero; no source change needed.')
          else:
              image_end = source.index(image_close, image_start) + len('      </div>\n')
              copy_block = source[copy_start:image_start]
              image_block = source[image_start:image_end]
              if '<!-- PRODUCT IMAGE BLOCK' not in image_block or '<!-- END PRODUCT IMAGE BLOCK -->' not in image_block:
                  raise SystemExit('Product image markers were not found in selected block.')
              updated = source[:copy_start] + image_block + '\n' + copy_block + source[image_end:]
              path.write_text(updated)
              print('Moved hero product image before eyebrow, heading, copy and CTAs.')
          PY
      - name: Remove temporary workflow from final diff
        run: git rm --ignore-unmatch .github/workflows/reorder-alicyn-hero-image.yml
      - name: Commit reordered Liquid section
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/alicyn-landing.liquid
          git diff --cached --quiet || git commit -m "fix: show Alicyn product image first in hero"
          git push origin HEAD:codex/reorder-alicyn-hero-image-first
