name: Build Alicyn Lab Navigator

on:
  push:
    branches: [codex/alicyn-lab-navigator]

permissions:
  contents: write

jobs:
  build-navigator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/alicyn-lab-navigator
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Write Navigator production files
        run: |
          python3 - <<'PY'
          import base64, gzip
          from pathlib import Path
          files = {
            'sections/alicyn-lab-navigator.liquid': '',
            'assets/alicyn-lab.css': '',
            'assets/alicyn-lab.js': '',
            'snippets/alicyn-lab-product-card.liquid': '',
            'templates/page.alicyn-lab.json': '',
          }
          for filename, encoded in files.items():
            path = Path(filename)
            path.parent.mkdir(parents=True, exist_ok=True)
            path.write_bytes(gzip.decompress(base64.b64decode(encoded)))
          print('Wrote', len(files), 'Navigator files')
          PY
      - name: Remove installer workflow from final change
        run: git rm --ignore-unmatch .github/workflows/build-alicyn-lab-navigator.yml
      - name: Commit production implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/alicyn-lab-navigator.liquid assets/alicyn-lab.css assets/alicyn-lab.js snippets/alicyn-lab-product-card.liquid templates/page.alicyn-lab.json
          git commit -m "feat: build Alicyn Lab Navigator experience"
          git push origin HEAD:codex/alicyn-lab-navigator
