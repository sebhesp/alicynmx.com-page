name: Enable Navigator Build
on:
  push:
    branches: [codex/alicyn-lab-navigator]
permissions:
  contents: write
jobs:
  enable:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/alicyn-lab-navigator
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Keep installer while generated assets are committed
        run: |
          sed -i '/git rm --ignore-unmatch .github\/workflows\/build-alicyn-lab-navigator.yml/d' .github/workflows/build-alicyn-lab-navigator.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-alicyn-lab-navigator.yml
          git commit -m "chore: allow Navigator asset generation" || true
          git push origin HEAD:codex/alicyn-lab-navigator
